<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Parking Slot Status</title>

  <style>
    body {
      margin: 0;
      padding: 40px;
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a; /* dark blue */
      color: #e5e7eb;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 20px;
      max-width: 800px;
    }

    .slot {
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      transition: transform 0.2s ease;
    }

    .slot:hover {
      transform: translateY(-3px);
    }

    .free {
      background: linear-gradient(135deg, #16a34a, #22c55e);
      color: #022c22;
    }

    .occupied {
      background: linear-gradient(135deg, #dc2626, #ef4444);
      color: #450a0a;
    }

    .slot-id {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 6px;
    }

    .status {
      font-size: 20px;
      letter-spacing: 0.5px;
    }

    .footer {
      margin-top: 40px;
      font-size: 13px;
      color: #64748b;
    }
  </style>
</head>

<body>

  <h1>Live Parking Status</h1>
  <div class="subtitle">Real-time slot occupancy from CCTV inference</div>

  <div id="slots" class="grid">
    <!-- slots will be injected here -->
  </div>

  <div class="footer">
    Data source: Local CV inference API
  </div>

  <script>
    const API_URL = "http://127.0.0.1:8000/api/slots";

    async function fetchSlots() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        const container = document.getElementById("slots");
        container.innerHTML = "";

        if (!data.slots || data.slots.length === 0) {
          container.innerHTML = "<div>Waiting for data...</div>";
          return;
        }

        data.slots.forEach(slot => {
          const div = document.createElement("div");
          div.className = "slot " + (slot.occupied ? "occupied" : "free");

          div.innerHTML = `
            <div class="slot-id">Slot ${slot.id}</div>
            <div class="status">
              ${slot.occupied ? "OCCUPIED" : "FREE"}
            </div>
          `;

          container.appendChild(div);
        });

      } catch (err) {
        console.error("API error:", err);
      }
    }

    // initial load + polling
    fetchSlots();
    setInterval(fetchSlots, 1000);
  </script>

</body>
</html>
